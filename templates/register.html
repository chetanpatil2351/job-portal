<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container form-container">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card shadow p-4">
                <h2 class="text-center">Register</h2>

                <form method="POST">
                    <input class="form-control my-2" name="name" placeholder="Name">
                    <input class="form-control my-2" name="email" placeholder="Email">
                    <input class="form-control my-2" type="password" name="password" placeholder="Password">

                    <select class="form-control my-2" name="role">
                        <option value="worker">Worker</option>
                        <option value="employer">Employer</option>
                    </select>

                    <button class="btn btn-primary w-100 mt-2">Register</button>
                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
