<!DOCTYPE html>
<html>
<head>
    <title>Job Portal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- 🔷 NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">
        <h4 class="fw-bold">🔍 Job Portal</h4>

        <div>
            <a href="/" class="nav-link d-inline">Home</a>
            <a href="/jobs" class="nav-link d-inline">Find Jobs</a>
            <a href="/login" class="btn btn-outline-dark btn-sm">Login</a>
            <a href="/register" class="btn btn-danger btn-sm">Register</a>
        </div>
    </div>
</nav>

<!-- 🔷 HERO SECTION -->
<section class="hero-section position-relative">
    <div class="container">
        <div class="row align-items-center">

            <!-- LEFT -->
            <div class="col-md-6">
                <h1 class="hero-title">
                    Connecting Local Talent With <br>
                     Daily Opportunities
                </h1>

                <!-- SEARCH BAR -->
                <form action="/jobs" method="GET" class="search-box mt-4">

                    <input type="text" name="search" placeholder="Job title or keyword">
                    <input type="text" name="location" placeholder="Location">

                    <button type="submit">Find Job</button>

                </form>
            </div>

            <!-- RIGHT IMAGE -->
            <div class="col-md-6 text-center">
                <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=600"
                     class="hero-img">
            </div>

        </div>
    </div>

</section>

</body>
</html>
