<!DOCTYPE html>
<html>
<head>
    <title>Post Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="col-md-6 mx-auto">

        <div class="card shadow p-4">
            <h3 class="text-center">Post Job</h3>

            <form method="POST">
                <input class="form-control my-2" name="title" placeholder="Job Title">
                <input class="form-control my-2" name="description" placeholder="Description">
                <input class="form-control my-2" name="wage" placeholder="Wage">
                <input class="form-control my-2" name="location" placeholder="Location">

                <button class="btn btn-primary w-100">Post Job</button>
            </form>

        </div>

    </div>
</div>

</body>
</html>
